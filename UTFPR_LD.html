<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Consultas UTFPR-LD</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f9f9fb;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #001f3f, #003366);
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin: 0;
    }

    header h1 a {
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    header h1 a:hover {
      color: #66ccff;
      text-decoration: underline;
    }

    header p {
      font-size: 1rem;
      margin-top: 10px;
      opacity: 0.9;
    }

    .chat-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      padding: 30px 0;
    }

    .chat-item {
      width: 90%;
      box-sizing: border-box;
      border-radius: 1px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      background-color: white;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .chat-item h2 {
      margin: 0;
      padding: 15px 20px;
      font-size: 1.1em;
      font-weight: bold;
      color: #003366;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #e6f0ff;
    }

    .chat-item h2:hover {
      background-color: #cce0ff;
    }

    .chat-item iframe {
      width: 100%;
      height: 500px;
      border: none;
      display: none;
    }

    .form-iframe iframe {
      height: 100vh;
    }

    .calendar-link-card {
      width: 90%;
      box-sizing: border-box;
      border-radius: 1px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.12);
      background-color: white;
      overflow: hidden;
    }

    .calendar-link-content {
      padding: 18px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(180deg, #f4f8ff 0%, #e9f1ff 100%);
      border-left: 4px solid #1e63c4;
    }

    .calendar-link-content h3 {
      margin: 0;
      color: #113768;
      font-size: 1.05rem;
    }

    .calendar-link-content p {
      margin: 4px 0 0;
      color: #365074;
      font-size: 0.9rem;
    }

    .calendar-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      border-radius: 999px;
      background: #1e63c4;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px 16px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .calendar-link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 14px rgba(30, 99, 196, 0.32);
    }

    footer {
      background: #001f3f;
      color: #ccc;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }

    footer a {
      color: #66ccff;
      margin: 0 8px;
      font-size: 1.1rem;
      text-decoration: none;
      transition: 0.3s;
    }

    footer a:hover {
      color: #fff;
    }

  </style>
  <link rel="stylesheet" href="ui-enhancements.css" />
</head>

<body>
  <header>
    <h1>
      <i class="fa-solid fa-comments"></i>
      <a href="index.html">Consultas UTFPR-LD</a>
    </h1>
    <p>Chats públicos da UTFPR-LD</p>
  </header>

  <div class="chat-container">
    <div class="chat-item">
      <h2>
        Consulta Empenhos UTFPR-LD
        <i class="fa-solid fa-chevron-down"></i>
      </h2>
      <iframe
        src="https://n8n.arthuraaferreira.com.br/form/34a67783-3867-4c0a-a233-a03cbf67703d"
      ></iframe>
    </div>

    <div class="chat-item">
      <h2>
        Cálculo valor bruto de um Pagamento de PF
        <i class="fa-solid fa-chevron-down"></i>
      </h2>
      <iframe
        src="https://n8n.arthuraaferreira.com.br/form/11cdcb50-cc1a-4a2f-9e34-5ff88b5b4696"
      ></iframe>
    </div>

    <div class="chat-item form-iframe">
      <h2>
        Consulta Ordem Bancária UTFPR-LD
        <i class="fa-solid fa-chevron-down"></i>
      </h2>
      <iframe
        src="https://n8n.arthuraaferreira.com.br/form/3915d4c3-07e4-4090-b687-f1e28f135848"
      ></iframe>
    </div>

    <div class="calendar-link-card">
      <div class="calendar-link-content">
        <div>
          <h3><i class="fa-solid fa-calendar-days"></i> Agenda de veículos</h3>
          <p>Acesse o calendário e a consulta de seguros dos veículos da UTFPR-LD.</p>
        </div>
        <a class="calendar-link-btn" href="UTFPR_LD_calendariodesegveiculos.html">
          <i class="fa-solid fa-arrow-up-right-from-square"></i> Abrir calendário
        </a>
      </div>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 Arthur Ferreira | ASGEAD-CT</p>
    <div>
      <a href="mailto:arthurferreira@utfpr.edu.br">
        <i class="fa-solid fa-envelope"></i>
      </a>
      <a href="https://instagram.com/arthuraaferreira" target="_blank" rel="noopener noreferrer">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </footer>

  <script>
    const chatHeaders = document.querySelectorAll(".chat-item h2");

    chatHeaders.forEach((header) => {
      header.addEventListener("click", () => {
        const iframe = header.nextElementSibling;
        const icon = header.querySelector("i");

        if (iframe.style.display === "block") {
          iframe.style.display = "none";
          icon.classList.replace("fa-chevron-up", "fa-chevron-down");
        } else {
          iframe.style.display = "block";
          icon.classList.replace("fa-chevron-down", "fa-chevron-up");
        }
      });
    });
  </script>
  <script src="ui-enhancements.js"></script>
</body>
</html>
